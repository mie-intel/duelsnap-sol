[toolchain]
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
duelsnap = "3o6vAECHh7CDLvbFn6DzTMMDFqbSmEbC9JLb4TAQn2Za"

[programs.devnet]
duelsnap = "3o6vAECHh7CDLvbFn6DzTMMDFqbSmEbC9JLb4TAQn2Za"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
